name: HelixDB Tests CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build-and-test:
    name: ${{ matrix.os }} / ${{ matrix.compiler }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        compiler: [gcc, clang]
        exclude:
          - os: windows-latest
            compiler: gcc
          - os: macos-latest
            compiler: gcc

    steps:
    - uses: actions/checkout@v4
    
    - name: Set Compiler Environment (Linux/macOS)
      if: runner.os != 'Windows'
      shell: bash
      run: |
        if [ "${{ matrix.compiler }}" = "gcc" ]; then
          echo "CC=gcc" >> $GITHUB_ENV
          echo "CXX=g++" >> $GITHUB_ENV
        else
          echo "CC=clang" >> $GITHUB_ENV
          echo "CXX=clang++" >> $GITHUB_ENV
        fi

    - name: Install Dependencies (Linux)
      if: runner.os == 'Linux'
      run: |
        sudo apt-get update
        sudo apt-get install -y cmake g++ libgtest-dev clang-tidy

    - name: Install Dependencies (macOS)
      if: runner.os == 'macOS'
      run: |
        brew install cmake googletest

    - name: Install Dependencies (Windows)
      if: runner.os == 'Windows'
      run: |
        vcpkg install gtest:x64-windows
    
    - name: Configure CMake
      shell: bash
      run: |
        CMAKE_FLAGS="-DCMAKE_BUILD_TYPE=Debug -DCMAKE_EXPORT_COMPILE_COMMANDS=ON"
        if [[ "${{ runner.os }}" == "Windows" ]]; then
          # Pass the toolchain file and specify the x64-windows triplet to match the installed package
          CMAKE_FLAGS="$CMAKE_FLAGS -DCMAKE_TOOLCHAIN_FILE=$VCPKG_INSTALLATION_ROOT/scripts/buildsystems/vcpkg.cmake -DVCPKG_TARGET_TRIPLET=x64-windows"
        fi
        cmake -S . -B build $CMAKE_FLAGS

    - name: Build
      run: cmake --build build --config Debug

    - name: Run Clang-Tidy (Linux Only)
      if: runner.os == 'Linux'
      run: |
        run-clang-tidy -p build "src/.*\.cpp|tests/.*\.cpp|main\.cpp"

    - name: Run Tests
      run: ctest --test-dir build -C Debug --output-on-failure